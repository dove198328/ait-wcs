spring:
  datasource:
    url: jdbc:postgresql://192.168.1.45:5432/ait_wcs_new?sslmode=disable&blobMode=off&options=-c%20TimeZone=Asia/Shanghai
    username: aitplus
    password: aitplus@1234
    type: com.zaxxer.hikari.HikariDataSource
    driver-class-name: org.postgresql.Driver
    hikari:
      # 获取连接超时时间
      connectionTimeout: 30000
      # 连接校验超时时间
      validationTimeout: 5000
      # 空闲连接最大存活时间，默认 10 分钟
      idleTimeout: 600000
      # 连接最大生命周期，0 表示不限制
      maxLifetime: 1800000
      # 连接保活检查间隔
      keepaliveTime: 30000
      maximum-pool-size: 20
      minimum-idle: 10
  redis:
    host: 192.168.1.45
    port: 6379
    password: 123456
    database: 15
    timeout: 5000ms
    lettuce:
      pool:
        max-active: 16
        max-idle: 8
        min-idle: 2
        max-wait: 5000ms

jetcache:
  remote:
    default:
      # 密码含 @ # 等字符时需 URL 编码；亦可整体用环境变量覆盖为单一 REDIS_URI（须与 database 一致）
      uri: redis://:${spring.redis.password}@${spring.redis.host}:${spring.redis.port}/${spring.redis.database}

camunda:
  bpm:
    database:
      type: postgres
      jdbc-batch-processing: false

# MQTT配置
mqtt:
  # 关闭整套 MQTT 自动配置时设为 false
  enabled: true
  # WMS（B）入站：与设备 topic 隔离；开启时必须配置 wms-inbound-topics
  wms-inbound-enabled: false
  #wms-inbound-topics: ""
  # 设备（A）入站；topic 留空时回落到下面的 default.topic
  device-inbound-enabled: false
  #device-inbound-topics: ""
  # MQTT代理服务器地址
  broker: tcp://192.168.1.120:1883
  # 客户端ID前缀
  clientId: wcs-mqtt-client-${wcs.workflow.allowedWarehouseIds[0]}
  # 用户名（如果需要认证）
  username: aitplus
  # 密码（如果需要认证）
  password: aitplus@123
  # 出站默认主题
  default:
    topic: wcs/command/default,led/program
  # 完成超时时间（毫秒）
  completion:
    timeout: 30000
  sendTopic:
    alarm: device/alarms
    # 状态主题
    status: device/status

wms:
  url: http://localhost:9020
  # 这里的upload是拍照完成上传
  upload: http://localhost:8000/uploads/
  api:
    # warehouseId 为逗号分隔多仓；由 WmsSyncDeviceWarehouseIdsEnvironmentPostProcessor 从 wcs.workflow.allowedWarehouseIds 推导 wms.api.sync-device-warehouse-ids
    sync_device: ${wms.url}/base/biDeviceManagement/deviceSyncList?warehouseId=${wms.api.sync-device-warehouse-ids}
