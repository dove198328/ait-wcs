spring:
  application:
    name: wcs-app
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  profiles:
    active: postgresql

# 开发环境配置
server:
  # 服务器的HTTP端口
  port: 9021
  # 优雅停机
  shutdown: graceful
  servlet:
    # 应用的访问路径
    context-path: /

# 是否开启swagger注解
swagger:
  enabled: true

# 是否开启返回数据加密
wcs:
  encrypt:
    enabled: false

# 同步数据的仓库id
wareHouseId: 1
