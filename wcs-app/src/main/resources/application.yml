spring:
  application:
    name: wcs-app
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  profiles:
    active: postgresql

# 开发环境配置
server:
  # 服务器的HTTP端口
  port: 9021
  # 优雅停机
  shutdown: graceful
  servlet:
    # 应用的访问路径
    context-path: /

# 是否开启swagger注解
swagger:
  enabled: true

# 是否开启返回数据加密
wcs:
  encrypt:
    enabled: false

# 同步数据的仓库id
wareHouseId: 1

# JetCache 二级缓存配置
jetcache:
  statIntervalMinutes: 15
  areaInCacheName: false
  local:
    default:
      type: caffeine
      limit: 200
      keyConvertor: fastjson2
      expireAfterWriteInMillis: 60000
  remote:
    default:
      type: redis.lettuce
      keyConvertor: fastjson2
      broadcastChannel: wcs-cache-invalidate
      valueEncoder: fastjson2
      valueDecoder: fastjson2
      # 推荐通过环境变量 REDIS_URI 提供，密码中若含特殊字符需先做 URL 编码
      uri: redis://:123456@192.168.1.45:6379
      expireAfterWriteInMillis: 300000
