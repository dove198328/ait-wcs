spring:
  application:
    name: wcs-app
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  profiles:
    active: test

# 开发环境配置
server:
  # 服务端 HTTP 端口
  port: 9021
  # 优雅停机
  shutdown: graceful
  servlet:
    # 应用访问路径
    context-path: /

# 是否开启 Swagger 文档
swagger:
  enabled: true

wcs:
  monitor:
    poll-interval-millis: 2000
    io-pool-size: 4
    default-point-ids: SBZT,XTXH,HCZT
    heartbeat-write-point-id: WXTXH
  # 是否开启返回数据加密
  encrypt:
    enabled: false
  workflow:
    # 当前实例允许处理的仓库列表
    allowedWarehouseIds:
      - 1
      - 2
    worker:
      # 嵌入式 worker 主题配置
      topics:
        generatePlan: wcs.generate-plan
        executeStep: wcs.execute-step
        handleException: wcs.handle-exception
      # 单次拉取任务数
      maxTasks: 20
      # 任务锁定时长，单位毫秒
      lockDurationMs: 60000
      # 长轮询超时时间，单位毫秒
      asyncResponseTimeoutMs: 30000

camunda:
  bpm:
    history-level: none
    authorization:
      enabled: false
    eventing:
      history: false
    database:
      schema-update: false
    job-execution:
      enabled: true
      # 减少作业获取延迟
      core-pool-size: 3
      # 控制作业并发
      max-pool-size: 6
      queue-capacity: 128
      lock-time-in-millis: 300000
      # 初始等待时间
      wait-time-in-millis: 2000
      # 1.0 表示不使用指数退避
      wait-increase-factor: 1.0
      # 最大获取等待时间
      max-wait: 5000
    filter:
      create: All
    generic-properties:
      properties:
        # 历史记录级别
        history: none
        historyCleanupBatchWindowStartTime: "00:00"
        historyCleanupBatchWindowEndTime: "01:00"
        historyCleanupStrategy: removalTimeBased
        historyRemovalTimeStrategy: end
        batchOperationHistoryTimeToLive: P1D
        historyTimeToLive: P1D
        # 降低历史清理并行度
        historyCleanupDegreeOfParallelism: 1
        historyCleanupJobLogTimeToLive: P1D
        # 单次清理批量
        historyCleanupBatchSize: 200
        telemetryReporterActivate: false
        historyCleanupMetricsEnabled: false
        # 见 https://github.com/camunda/camunda-bpm-platform/issues/2969 ：关闭「隐式变量更新检测」，
        implicitVariableUpdateDetectionEnabled: false
    metrics:
      enabled: false
      db-reporter-activate: false

# JetCache 二级缓存配置（远端 Redis 与 spring.redis 同一实例/库）
jetcache:
  statIntervalMinutes: 15
  areaInCacheName: false
  local:
    default:
      type: caffeine
      limit: 200
      keyConvertor: fastjson2
      expireAfterWriteInMillis: 60000
  remote:
    default:
      type: redis.lettuce
      keyConvertor: fastjson2
      broadcastChannel: wcs-cache-invalidate
      valueEncoder: java
      valueDecoder: java

# MQTT配置
mqtt:
  # 关闭整套 MQTT 自动配置时设为 false
  enabled: true
  # WMS（B）入站：与设备 topic 隔离；开启时必须配置 wms-inbound-topics
  wms-inbound-enabled: false
  #wms-inbound-topics: ""
  # 设备（A）入站；topic 留空时回落到下面的 default.topic
  device-inbound-enabled: false
  #device-inbound-topics: ""
  # MQTT代理服务器地址
  broker: tcp://192.168.1.120:1883
  # 客户端ID前缀
  clientId: wcs-mqtt-client-${wcs.workflow.allowedWarehouseIds[0]}
  # 用户名（如果需要认证）
  username: aitplus
  # 密码（如果需要认证）
  password: aitplus@123
  # 出站默认主题
  default:
    topic: wcs/command/default,led/program
  # 完成超时时间（毫秒）
  completion:
    timeout: 30000
  sendTopic:
    alarm: device/alarms
    # 状态主题
    status: device/status