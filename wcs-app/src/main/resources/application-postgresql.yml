spring:
  datasource:
    url: jdbc:postgresql://192.168.1.45:5432/ait_wcs_new?sslmode=disable&blobMode=off&options=-c%20TimeZone=Asia/Shanghai
    username: aitplus
    password: aitplus@1234
    type: com.zaxxer.hikari.HikariDataSource
    driver-class-name: org.postgresql.Driver
    hikari:
      # 获取连接超时时间
      connectionTimeout: 30000
      # 连接校验超时时间
      validationTimeout: 5000
      # 空闲连接最大存活时间，默认 10 分钟
      idleTimeout: 600000
      # 连接最大生命周期，0 表示不限制
      maxLifetime: 1800000
      # 连接保活检查间隔
      keepaliveTime: 30000
      maximum-pool-size: 20
      minimum-idle: 10
  redis:
    host: 192.168.1.45
    port: 6379
    password: 123456
    database: 15
    timeout: 5000ms
    lettuce:
      pool:
        max-active: 16
        max-idle: 8
        min-idle: 2
        max-wait: 5000ms

camunda:
  bpm:
    database:
      type: postgres
      jdbc-batch-processing: false
